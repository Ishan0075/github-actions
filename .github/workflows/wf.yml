name: myfirst
#to push anything to this branch
on: 
  push:
   branches:
    - main
    - dev
  pull_request:
   branches:
    - main
    # - dev
jobs:
  unit-tests:
    name: running unit test
    runs-on: ubuntu-slim
    steps:
      - name: checkout code
        uses: actions/checkout@v5.0.0
      - name: setup python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: '3.10'
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run:  |
          mkdir reports/
          pytest --junitxml=reports/unit-test-results.xml --cov=./ --cov-report=xml --cov-report=term-missing -v
      - name: upload code coverage report
        uses: actions/upload-artifact@v3.0.0
        with:
          name: unit-test-report
          path: reports/     
