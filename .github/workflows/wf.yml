name: myfirst
#to push anything to this branch
on: 
  push:
    - dev


jobs:
 job1:
   name: JOB1
   runs-on: ubuntu-slim
   steps:
     - name: checking the current directory
       run: |
          pwd
          ls -lrt
          hostname
     - name: checkout
       uses: actions/checkout@v5.0.0
     - name: step-3
       run: |
         echo `pwd` >> myartifact.txt
         mkdir artifacts
         echo `ls -lrt` >> artifacts/list.txt
         echo `hostname` >> artifacts/hostname.txt
     - name: upload-artifact
       uses: actions/upload-artifact@v5.0.0
       with:
         name: single_file
         path: ./myartifact.txt
 job2:
  name: JOB2
  needs: job1
  runs-on: ubuntu-slim
  steps:
     - name: checking the current directory
       run: |
          pwd
          ls -lrt
     - name: download-artifact
       uses: actions/download-artifact@v5.0.0
       with:
         name: single_file  
     - name: checking current directory post downlaod
       run: |
         pwd
         ls -lrt
