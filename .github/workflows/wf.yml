name: myfirst
#to push anything
on: 
  push:
   branches:
    - release
    - dev
  pull_request:
   branches:
    - main
    # - dev

permissions:
  actions: read
  contents: read
  packages: write
  security-events: write
jobs:
  ci-pipeline-job:
    uses: Ishan0075/reusable-gh/.github/workflows/ci-pipeline.yml@main
    with:
      run_codeql: true
      run_sonar: false
      run_build: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}