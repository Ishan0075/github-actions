  build:
    name: Build and push Docker image
    # needs: sonarqube
    runs-on: ubuntu-latest
    if: success()
    outputs:
      image-tag: ${{ steps.vars.outputs.IMAGE_TAG }}
    steps:
      - name: checkout code
        uses: actions/checkout@v5.0.0
      - name: setup docker buildx
        uses: docker/setup-buildx-action@v3.0.0
      - name: generate image tags
        id: vars
        run: |
             IMAGE_TAG="${{ github.run_id }}"
             echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT
      - name: Build Image (no push)
        uses: docker/build-push-action@v5.0.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          provenance: false
          tags: my-first-app:${{ steps.vars.outputs.IMAGE_TAG }}
      - name: save docker image as artifact
        run: docker save my-first-app:${{ steps.vars.outputs.IMAGE_TAG }} -o my-first-app.tar
      - name: upload docker image artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: docker-image
          path: my-first-app.tar

  publish-dockerhub:
    name: Publish Docker image to DockerHub
    needs: build
    runs-on: ubuntu-latest    
    steps:
      - name: download the image
        uses: actions/download-artifact@v5.0.0
        with:
          name: docker-image
          path: .
      - name: load docker image
        run: docker load -i my-first-app.tar
      - name: docker login
        uses: docker/login-action@v3.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: tag image
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
          docker image tag my-first-app:${IMAGE_TAG} ${{ secrets.DOCKERHUB_USERNAME }}/my-first-app:${IMAGE_TAG}
      - name: push image
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-first-app:${IMAGE_TAG}

  publish-ghcr:
    name: Publish Docker image to GHCR
    needs: build
    runs-on: ubuntu-latest    
    permissions:
      contents: read
      packages: write
    steps:
      - name: download the image
        uses: actions/download-artifact@v5.0.0
        with:
          name: docker-image
          path: .
      - name: load docker image
        run: docker load -i my-first-app.tar
      - name: login to ghcr
        uses: docker/login-action@v3.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # given by github automatically, no need to create a personal access token
      - name: tag image
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
          OWNER="${{ github.repository_owner }}"
          docker image tag my-first-app:${IMAGE_TAG} ghcr.io/${OWNER,,}/my-first-app:${IMAGE_TAG}
      - name: push image
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
          OWNER="${{ github.repository_owner }}"
          docker push ghcr.io/${OWNER,,}/my-first-app:${IMAGE_TAG}

  deploy-with-kubernetes:
    needs: publish-ghcr
    runs-on: github-actions-scaleset-demot
    steps:
      - name: checkout repository
        uses: actions/checkout@v3

      - name: Install kubectl
        run: |
          curl -LO "https://storage.googleapis.com/kubernetes-release/release/$(curl -s https://storage.googleapis.com/kubernetes-release/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Configure kubeconfig
        run: |
         mkdir -p $HOME/.kube
         echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
         kubectl version
         kubectl get nodes   

