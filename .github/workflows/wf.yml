name: myfirst
#to push anything to this branch
on: 
  push:
   branches:
    - main
    - dev
  pull_request:
   branches:
    - main
    # - dev
jobs:
  unit-tests:
    name: running unit test
    runs-on: ubuntu-slim
    steps:
      - name: checkout code
        uses: action/checkout@v5.0.0
      - name: setup python
        uses: action/setup-python@v6.0.0
        with:
          python-version: '3.10'
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: pytest -v
          
